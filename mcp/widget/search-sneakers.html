<div id="sneaker-widget-root" style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;max-width:720px;">
  <div id="sw-filters" style="display:flex;gap:8px;flex-wrap:wrap;align-items:end;margin-bottom:14px;padding:12px;background:#f5f5f5;border-radius:8px;">
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px;">Max Price</label>
      <input id="sw-max-price" type="number" placeholder="$200" style="width:80px;padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;">
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px;">Color</label>
      <select id="sw-color" style="padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;">
        <option value="">Any</option>
        <option>Black</option><option>White</option><option>Navy</option>
        <option>Red</option><option>Blue</option><option>Orange</option>
        <option>Gray</option><option>Green</option>
      </select>
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:#555;margin-bottom:3px;">Size</label>
      <select id="sw-size" style="padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;">
        <option value="">Any</option>
        <option>6</option><option>7</option><option>8</option><option>9</option>
        <option>9.5</option><option>10</option><option>10.5</option><option>11</option>
        <option>12</option><option>13</option>
      </select>
    </div>
    <button id="sw-apply" style="padding:7px 16px;background:#e53935;color:#fff;border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;">Apply Filters</button>
  </div>

  <div id="sw-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;"></div>
  <div id="sw-empty" style="display:none;color:#888;font-size:13px;padding:20px 0;text-align:center;">No sneakers matched those filters.</div>
</div>

<style>
  .sw-card { border:1px solid #eee; border-radius:8px; overflow:hidden; background:#fff; }
  .sw-card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#f0f0f0; }
  .sw-card-body { padding:8px 10px; }
  .sw-card-name { font-size:12.5px; font-weight:600; color:#111; text-decoration:none; display:block; margin-bottom:4px; line-height:1.3; }
  .sw-card-price { font-size:13px; font-weight:700; color:#111; }
  .sw-card-compare { font-size:11px; color:#999; text-decoration:line-through; margin-left:5px; }
  .sw-card-link { display:block; margin-top:6px; font-size:11px; font-weight:600; color:#e53935; text-decoration:none; }
</style>

<script>
(function () {
  var SITE_ORIGIN = "https://cstore-new.vercel.app";

  // Read once at load — reportPrompt() below increments this in place
  // *before* render() runs for a given prompt, so links always carry the
  // count as of the prompt that produced them, not the prior one.
  var currentPromptCount = (function () {
    try { return parseInt(localStorage.getItem("cs_prompt_count") || "0", 10); } catch (e) { return 0; }
  })();

  // Whether the filter bar has ever been used *this session* — persisted via
  // localStorage since each prompt gets a fresh widget instance. Re-asserted
  // (not forced true) on every load so every session gets an explicit
  // true/false DVAR rather than leaving it unset for sessions that never
  // touch the filters, which is exactly the "re-prompting instead of using
  // in-app tools" pattern the use case doc calls out.
  function setFilterUsedFlag(usedNow) {
    var persisted = false;
    try { persisted = localStorage.getItem("cs_filter_used") === "true"; } catch (e) {}
    var value = usedNow || persisted;
    if (usedNow) {
      try { localStorage.setItem("cs_filter_used", "true"); } catch (e) {}
    }
    window._uxa = window._uxa || [];
    // CSQ's setCustomVariable requires a numeric index first (1-20), not the
    // name — index 14 = filterBarUsed, kept consistent with the Selenium
    // scripts' CS_CUSTOM_VAR_INDEX map (same CSQ project, shared index space).
    window._uxa.push(["setCustomVariable", 14, "filterBarUsed", value ? "true" : "false", "visit"]);
    if (usedNow) window._uxa.push(["trackPageEvent", "FilterBarUsed"]);
  }

  function render(products) {
    var grid = document.getElementById("sw-grid");
    var empty = document.getElementById("sw-empty");
    if (!products || !products.length) {
      grid.innerHTML = "";
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";
    grid.innerHTML = products.map(function (p) {
      var link = SITE_ORIGIN + "/product/" + p.slug + "?utm_source=chatgpt_app&utm_medium=ai_assistant&utm_campaign=sneaker_finder&prompt_count=" + currentPromptCount;
      var compare = (p.compare_price && p.compare_price > p.price)
        ? '<span class="sw-card-compare">$' + Number(p.compare_price).toFixed(2) + '</span>' : '';
      return (
        '<div class="sw-card">' +
          '<a href="' + link + '" target="_blank" rel="noopener">' +
            '<img src="' + (p.image_url || '') + '" alt="' + p.name + '" loading="lazy">' +
          '</a>' +
          '<div class="sw-card-body">' +
            '<a class="sw-card-name" href="' + link + '" target="_blank" rel="noopener">' + p.name + '</a>' +
            '<span class="sw-card-price">$' + Number(p.price).toFixed(2) + '</span>' + compare +
            '<a class="sw-card-link" href="' + link + '" target="_blank" rel="noopener">View on CStore &rarr;</a>' +
          '</div>' +
        '</div>'
      );
    }).join("");
  }

  function currentFilters() {
    return {
      max_price: document.getElementById("sw-max-price").value ? Number(document.getElementById("sw-max-price").value) : undefined,
      color: document.getElementById("sw-color").value || undefined,
      size: document.getElementById("sw-size").value || undefined,
    };
  }

  document.getElementById("sw-apply").addEventListener("click", function () {
    setFilterUsedFlag(true);
    var filters = currentFilters();
    if (window.openai && window.openai.callTool) {
      window.openai.callTool("search_sneakers", filters).then(function (result) {
        var products = (result && result.structuredContent && result.structuredContent.products) || [];
        render(products);
      }).catch(function (err) {
        console.error("search_sneakers call failed", err);
      });
    }
  });

  // Prompt tracking. window.openai.toolInput.userPrompt is the mechanism
  // CSQ's docs describe (ChatGPT auto-summarizes the user's message into a
  // reserved input field) — unverified against OpenAI's public docs as of
  // this build, so also check toolOutput.userPrompt, which is guaranteed to
  // work since our own server echoes back whatever arrived in the tool call
  // args. Tagging which source actually had a value turns this into its own
  // empirical test instead of needing separate throwaway diagnostic code.
  var promptReported = false;
  function reportPrompt(explicitPrompt) {
    if (promptReported) return;
    var fromInput = window.openai && window.openai.toolInput && window.openai.toolInput.userPrompt;
    var fromOutput = (window.openai && window.openai.toolOutput && window.openai.toolOutput.userPrompt) || explicitPrompt;
    var promptText = fromInput || fromOutput;
    if (!promptText) return;
    promptReported = true;
    currentPromptCount += 1;
    try { localStorage.setItem("cs_prompt_count", String(currentPromptCount)); } catch (e) {}
    window._uxa = window._uxa || [];
    window._uxa.push(["trackPageEvent", "UserPromptReceived"]);
    // Indices kept consistent with the Selenium scripts' CS_CUSTOM_VAR_INDEX
    // map (same CSQ project, shared 1-20 index space): 15 = userPrompt,
    // 13 = promptCount. userPromptSource previously spent its own DVAR slot
    // on "which of toolInput/toolOutput actually had the value" — still
    // worth knowing, just not worth a permanent slot, so it's console-only now.
    console.log("CS userPrompt source: " + (fromInput ? "toolInput" : "toolOutput_fallback"));
    window._uxa.push(["setCustomVariable", 15, "userPrompt", promptText, "visit"]);
    window._uxa.push(["setCustomVariable", 13, "promptCount", String(currentPromptCount), "visit"]);
  }

  // window.openai.toolOutput is NOT guaranteed to be populated yet when this
  // script first runs — the host delivers it asynchronously and signals
  // updates via the "openai:set_globals" event. Try immediately (cheap, in
  // case it's already there), and re-check every time that event fires.
  // reportPrompt() runs BEFORE render() so a genuinely new prompt bumps
  // currentPromptCount in time for the links render() builds right after.
  function tryRenderFromGlobal() {
    var out = window.openai && window.openai.toolOutput;
    if (out && out.products) {
      reportPrompt();
      setFilterUsedFlag(false);
      render(out.products);
      return true;
    }
    return false;
  }

  if (!tryRenderFromGlobal()) {
    window.addEventListener("openai:set_globals", tryRenderFromGlobal);
  }

  // Belt-and-suspenders: also handle the raw postMessage notification shape,
  // in case set_globals isn't the event actually firing in this host version.
  window.addEventListener("message", function (event) {
    if (event.source !== window.parent) return;
    var message = event.data;
    if (!message || message.method !== "ui/notifications/tool-result") return;
    var data = message.params && message.params.structuredContent;
    if (data && data.products) {
      reportPrompt(data.userPrompt);
      setFilterUsedFlag(false);
      render(data.products);
    }
  });
})();
</script>

<!-- ContentSquare tag — same tag used on the main CStore site, so this
     widget's session is captured in CSQ's session replay, per the "session
     replay inside the ChatGPT App iframe" claim in the Human & Agent
     Interactions use case. setIframeAutonomous tells the tag it's running
     inside an iframe with no parent-frame CSQ tag to hand off to — without
     it, the tag can load fine and still never actually record a session. -->
<script type="text/javascript">
(function() {
  window._uxa = window._uxa || [];
  window._uxa.push(["setIframeAutonomous"]);
  var mt = document.createElement("script");
  mt.type = "text/javascript";
  mt.async = true;
  mt.src = "//t.contentsquare.net/uxa/024c3a9e92fc6.js";
  document.getElementsByTagName("head")[0].appendChild(mt);
})();
</script>
